services:
  app:
    build:
      context: .
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
    restart: unless-stopped
    environment:
      # Server-side Supabase calls go straight to Kong over the proxy network
      # instead of out through Traefik. Empty/unset falls back to the public
      # NEXT_PUBLIC_SUPABASE_URL. Runtime var — no rebuild needed to change it.
      - SUPABASE_INTERNAL_URL=${SUPABASE_INTERNAL_URL:-}
      # Instant bug-triage webhook (n8n). Runtime vars — the submit server action
      # POSTs {reportId, secret} here after a report lands. Unset = triage skipped.
      - BUG_TRIAGE_WEBHOOK_URL=${BUG_TRIAGE_WEBHOOK_URL:-}
      - BUG_TRIAGE_WEBHOOK_SECRET=${BUG_TRIAGE_WEBHOOK_SECRET:-}
      # Auto-investigate hook: fired when a report is marked Verify. Shares the
      # triage secret above. Unset = marking Verify just updates status.
      - BUG_INVESTIGATE_WEBHOOK_URL=${BUG_INVESTIGATE_WEBHOOK_URL:-}
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.flat-rate-tracker.rule=Host(`tracker.slimelab.cc`)"
      - "traefik.http.routers.flat-rate-tracker.entrypoints=websecure-int, websecure-ext"
      - "traefik.http.routers.flat-rate-tracker.tls=true"
      - "traefik.http.routers.flat-rate-tracker.tls.certresolver=cloudflare"
      - "traefik.http.services.flat-rate-tracker.loadbalancer.server.port=3000"

networks:
  proxy:
    external: true
