services:
  frt:
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
    container_name: frt
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frt.rule=Host(`tracker.slimelab.cc`)"
      - "traefik.http.routers.frt.entrypoints=websecure-int,websecure-ext"
      - "traefik.http.routers.frt.tls.certresolver=cloudflare"
      - "traefik.http.services.frt.loadbalancer.server.port=3000"
      - "traefik.docker.network=proxy"

networks:
  proxy:
    external: true
