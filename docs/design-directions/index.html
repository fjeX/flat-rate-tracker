<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FRT — Design Directions</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; background: #0d0e10; color: #e8e6e3; font: 14px/1.5 ui-sans-serif, system-ui, sans-serif; }
  header { position: sticky; top: 0; z-index: 10; background: rgba(13,14,16,.94); backdrop-filter: blur(8px); border-bottom: 1px solid #26282c; padding: 12px 20px; display: flex; flex-wrap: wrap; gap: 18px; align-items: center; }
  h1 { font-size: 15px; margin: 0 12px 0 0; }
  .group { display: flex; gap: 4px; align-items: center; }
  .group span { font-size: 11px; text-transform: uppercase; letter-spacing: .07em; color: #8b8880; margin-right: 4px; }
  button { font: inherit; font-size: 13px; padding: 5px 12px; border-radius: 999px; border: 1px solid #33363c; background: transparent; color: #b5b2ab; cursor: pointer; }
  button.on { background: #ea580c; border-color: #ea580c; color: #fff; }
  main { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; padding: 16px 20px 40px; align-items: start; }
  @media (max-width: 1000px) { main { grid-template-columns: 1fr; } }
  .col h2 { font-size: 14px; margin: 4px 2px 2px; }
  .col p { font-size: 12.5px; color: #a3a09a; margin: 0 2px 10px; min-height: 72px; }
  .col img { width: 100%; border: 1px solid #2a2d32; border-radius: 8px; display: block; }
  .col.mobile img { max-width: 390px; margin: 0 auto; }
  .foot { padding: 0 20px 30px; color: #8b8880; font-size: 12.5px; max-width: 760px; }
  a { color: #ea580c; }
</style>
</head>
<body>
<header>
  <h1>FRT — Design directions</h1>
  <div class="group" id="g-page"><span>Page</span></div>
  <div class="group" id="g-theme"><span>Theme</span></div>
  <div class="group" id="g-width"><span>Width</span></div>
</header>
<main id="grid"></main>
<div class="foot">
  Live versions (dev server running): <a href="http://localhost:3000/preview">localhost:3000/preview</a> —
  the bar at the top of each live preview flips direction and theme. Mobile screenshots are full-page,
  with the bottom nav shown at the end of the page instead of floating.
</div>
<script>
const DIRS = [
  { key: 'a', name: 'A — Instrument Cluster',
    blurb: 'Reads like a scan tool. Flat near-black panels, hairline rules, tight density, every number in JetBrains Mono, uppercase micro-labels, amber accent. Maximum data per screen-inch; chrome gets out of the way of the numbers.' },
  { key: 'b', name: 'B — Calm Workspace',
    blurb: 'Modern SaaS. Separation by elevation and air instead of borders, bigger type, soft 18px corners, pill controls, muted color until something needs attention. Feels finished the way Linear or Notion feels finished.' },
  { key: 'c', name: 'C — Tactile Shop Tool',
    blurb: 'Jobsite-tool energy. 52px touch targets, 2px borders, saturated safety orange, filled state chips, heavy numerals. Built for a phone held in one greasy glove — every control hittable without looking carefully.' },
];
const PAGES = ['dashboard', 'log', 'history'];
const THEMES = ['dark', 'light'];
const WIDTHS = ['desktop', 'mobile'];
const state = { page: 'dashboard', theme: 'dark', width: 'desktop' };

function seg(id, options, key) {
  const g = document.getElementById(id);
  options.forEach(o => {
    const b = document.createElement('button');
    b.textContent = o;
    b.onclick = () => { state[key] = o; render(); };
    b.dataset.v = o; g.appendChild(b);
  });
}
seg('g-page', PAGES, 'page');
seg('g-theme', THEMES, 'theme');
seg('g-width', WIDTHS, 'width');

function render() {
  document.querySelectorAll('.group button').forEach(b =>
    b.classList.toggle('on', Object.values(state).includes(b.dataset.v)));
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  DIRS.forEach(d => {
    const col = document.createElement('div');
    col.className = 'col ' + state.width;
    col.innerHTML = `<h2>${d.name}</h2><p>${d.blurb}</p>
      <img loading="lazy" src="shots/${d.key}-${state.page}-${state.theme}-${state.width}.png"
           alt="${d.name} — ${state.page}, ${state.theme}, ${state.width}">`;
    grid.appendChild(col);
  });
}
render();
</script>
</body>
</html>
